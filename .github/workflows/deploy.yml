name: Deploy to Hetzner

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: SSH and git pull
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HETZNER_HOST }}
          username: ${{ secrets.HETZNER_USER }}
          key: ${{ secrets.HETZNER_SSH_KEY }}
          script: |
            cd ${{ secrets.HETZNER_REPO_PATH }}
            git pull origin main
            # Set up weekly book scout cron (Fridays 8am) if not already present
            (crontab -l 2>/dev/null | grep -q 'book_scout_cron') || \
              { crontab -l 2>/dev/null; echo "0 8 * * 5 ${{ secrets.HETZNER_REPO_PATH }}/venv/bin/python3 ${{ secrets.HETZNER_REPO_PATH }}/agents/book_scout_cron.py >> ${{ secrets.HETZNER_REPO_PATH }}/logs/book_scout_cron.log 2>&1"; } | crontab -
            # Run book scout immediately so Vernie can confirm delivery (output visible here for debugging)
            ${{ secrets.HETZNER_REPO_PATH }}/venv/bin/python3 ${{ secrets.HETZNER_REPO_PATH }}/agents/book_scout_cron.py || echo "[deploy] book_scout_cron.py exited with error — check output above"
